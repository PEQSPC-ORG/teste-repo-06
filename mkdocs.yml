site_name: teste-repo-06
site_description: Documentation for teste-repo-06
repo_url: https://github.com/PEQSPC-ORG/teste-repo-06
edit_uri: edit/main/docs/

nav:
  - Home: index.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra:
